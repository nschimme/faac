name: Benchmark

on:
  push:
    branches: [ "master" ]
    paths:
      - "libfaac/**"
      - "tests/**"
      - ".github/workflows/benchmark.yml"
  pull_request:
    branches: [ "master" ]
    paths:
      - "libfaac/**"
      - "tests/**"
      - ".github/workflows/benchmark.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    # NOTE: ViSQOL via visqol-py is currently most reliable on ubuntu-22.04.
    name: ${{ matrix.arch }} / ${{ matrix.precision }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64]
        precision: [single, double]
        include:
          - arch: amd64
            os: ubuntu-22.04

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build bc ffmpeg

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'tests/requirements.txt'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -r tests/requirements.txt

      - name: Restore Datasets
        id: cache-datasets
        uses: actions/cache/restore@v4
        with:
          path: tests/data/external
          key: ${{ runner.os }}-datasets-${{ hashFiles('tests/setup_datasets.py') }}

      - name: Setup Datasets
        if: steps.cache-datasets.outputs.cache-hit != 'true'
        run: |
          python3 tests/setup_datasets.py

      - name: Save Datasets
        if: steps.cache-datasets.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: tests/data/external
          key: ${{ runner.os }}-datasets-${{ hashFiles('tests/setup_datasets.py') }}

      - name: Set up Docker Buildx
        uses: actions/setup-buildx-action@v3

      - name: Build ViSQOL Docker Image
        uses: docker/build-push-action@v5
        with:
          context: tests
          file: tests/Dockerfile.visqol
          tags: faac-visqol:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Determine Baseline SHA
        id: baseline-sha
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          else
            echo "sha=${{ github.event.pull_request.base.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Restore Baseline Results
        id: cache-baseline
        uses: actions/cache/restore@v4
        with:
          path: tests/results/${{ matrix.arch }}_${{ matrix.precision }}_base.json
          key: ${{ runner.os }}-baseline-${{ matrix.arch }}-${{ matrix.precision }}-${{ steps.baseline-sha.outputs.sha }}-${{ hashFiles('tests/*.py', 'tests/requirements.txt') }}

      - name: Run Phase 1 (Baseline Encoding)
        if: steps.cache-baseline.outputs.cache-hit != 'true'
        run: |
          git checkout ${{ steps.baseline-sha.outputs.sha }}
          mkdir -p tests/results
          meson setup build_base -Dfloating-point=${{ matrix.precision }} --buildtype=release
          ninja -C build_base
          LIB_PATH="${{ github.workspace }}/build_base/libfaac/libfaac.so"
          FAAC_PATH="${{ github.workspace }}/build_base/frontend/faac"
          # Restore benchmark scripts and config from PR branch to ensure consistent comparison logic
          git checkout ${{ github.sha }} -- tests/
          python3 tests/phase1_encode.py "$FAAC_PATH" "$LIB_PATH" "${{ matrix.arch }}_${{ matrix.precision }}_base" "tests/results/${{ matrix.arch }}_${{ matrix.precision }}_base.json" --coverage 100

      - name: Run Phase 2 (Baseline MOS)
        if: steps.cache-baseline.outputs.cache-hit != 'true'
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/tests/results:/results \
            -v ${{ github.workspace }}/tests/output:/output \
            -v ${{ github.workspace }}/tests/data/external:/data \
            faac-visqol /results/${{ matrix.arch }}_${{ matrix.precision }}_base.json /output /data

      - name: Save Baseline Results
        if: success() && steps.cache-baseline.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: tests/results/${{ matrix.arch }}_${{ matrix.precision }}_base.json
          key: ${{ runner.os }}-baseline-${{ matrix.arch }}-${{ matrix.precision }}-${{ steps.baseline-sha.outputs.sha }}-${{ hashFiles('tests/*.py', 'tests/requirements.txt') }}

      - name: Run Phase 1 (Candidate Encoding)
        if: github.event_name == 'pull_request'
        run: |
          git checkout ${{ github.sha }}
          mkdir -p tests/results
          meson setup build_cand -Dfloating-point=${{ matrix.precision }} --buildtype=release
          ninja -C build_cand
          LIB_PATH="${{ github.workspace }}/build_cand/libfaac/libfaac.so"
          FAAC_PATH="${{ github.workspace }}/build_cand/frontend/faac"
          python3 tests/phase1_encode.py "$FAAC_PATH" "$LIB_PATH" "${{ matrix.arch }}_${{ matrix.precision }}_cand" "tests/results/${{ matrix.arch }}_${{ matrix.precision }}_cand.json" --coverage 100

      - name: Run Phase 2 (Candidate MOS)
        if: github.event_name == 'pull_request'
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/tests/results:/results \
            -v ${{ github.workspace }}/tests/output:/output \
            -v ${{ github.workspace }}/tests/data/external:/data \
            faac-visqol /results/${{ matrix.arch }}_${{ matrix.precision }}_cand.json /output /data

      - name: Upload Results
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.arch }}-${{ matrix.precision }}
          path: tests/results/*.json

  report:
    name: Consolidated Report
    needs: benchmark
    runs-on: ubuntu-latest
    env:
      BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
      CAND_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    if: always() && github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: results
          pattern: results-*
          merge-multiple: true

      - name: Generate Report
        id: generate
        run: |
          # Summary report for PR comment (high-signal only)
          python3 tests/compare_results.py results --summary-only --base-sha "${{ env.BASE_SHA }}" --cand-sha "${{ env.CAND_SHA }}" > report-summary.md || echo "REGRESSION_DETECTED=1" >> $GITHUB_ENV
          # Full report for artifact (all details)
          python3 tests/compare_results.py results --base-sha "${{ env.BASE_SHA }}" --cand-sha "${{ env.CAND_SHA }}" > report-full.md || true
          if [ ! -s report-summary.md ]; then
            echo "Error: report-summary.md is empty"
            exit 1
          fi
          cat report-summary.md

      - name: Upload Full Report
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report-full
          path: |
            report-full.md
            results/*.json

      - name: PR Feedback
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (fs.existsSync('report-summary.md')) {
              let report = fs.readFileSync('report-summary.md', 'utf8').trim();
              if (report.length > 0) {
                const jobUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
                const readmeUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/blob/${process.env.GITHUB_SHA}/tests/README.md`;
                report += `\n\n---\n[View Detailed Job Log and Full Report](${jobUrl}) | [What Is This?](${readmeUrl})`;
                github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: report
                })
              }
            }

      - name: Check for Regressions
        run: |
          if [ "${{ env.REGRESSION_DETECTED }}" == "1" ]; then
            echo "Regressions or missing data detected. Failing job."
            exit 1
          fi
