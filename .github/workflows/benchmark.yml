name: Efficiency & Perceptual

on:
  pull_request:
    branches: [ "master" ]
    paths:
      - "libfaac/**"
      - "tests/**"

jobs:
  test:
    name: ubuntu-22.04
    runs-on: ubuntu-22.04

    steps:
      - name: Install dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build bc faad ffmpeg

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install numpy
        run: pip install numpy

      - name: Cache ViSQOL Repo
        id: cache-visqol
        uses: actions/cache@v4
        with:
          path: visqol-repo
          key: ${{ runner.os }}-visqol-repo-v1

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.8.1
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Build ViSQOL
        run: |
          if [ ! -d visqol-repo ]; then
            git clone --depth 1 https://github.com/google/visqol.git visqol-repo
          fi
          cd visqol-repo
          bazel build -c opt :visqol
          sudo cp bazel-bin/visqol /usr/local/bin/visqol
          mkdir -p ../model
          cp model/lattice_tcditugenmeetpackhref_ls2_nl60_lr12_bs2048_learn.005_ep2400_train1_7_raw.tflite ../model/
          cp model/libsvm_nu_svr_model.txt ../model/

      - name: Cache Datasets
        id: cache-datasets
        uses: actions/cache@v4
        with:
          path: tests/data/external
          key: ${{ runner.os }}-datasets-v3

      - name: Setup Datasets
        if: steps.cache-datasets.outputs.cache-hit != 'true'
        run: |
          python3 tests/setup_datasets.py

      - name: Build and Run Matrix
        shell: bash
        run: |
          echo "## Summary Report for ubuntu-22.04" > report.md
          for precision in single double; do
            echo "---" >> report.md
            echo "### Precision: $precision" >> report.md

            # 1. Build Candidate (Current branch)
            rm -rf build_cand
            meson setup build_cand -Dfloating-point=$precision --buildtype=release
            ninja -C build_cand

            # Candidate paths
            LIB_PATH_CAND="build_cand/libfaac/libfaac.so"
            FAAC_PATH_CAND="build_cand/frontend/faac"

            PERC_FLAG="--perceptual"

            python3 tests/run_benchmark.py $FAAC_PATH_CAND $LIB_PATH_CAND ${precision}_cand ${precision}_cand.json $PERC_FLAG

            # 2. Build Baseline
            git checkout ${{ github.base_ref }}
            rm -rf build_base
            meson setup build_base -Dfloating-point=$precision --buildtype=release
            ninja -C build_base

            # Baseline paths
            LIB_PATH_BASE="build_base/libfaac/libfaac.so"
            FAAC_PATH_BASE="build_base/frontend/faac"

            # Restore benchmark scripts from PR branch
            git checkout ${{ github.sha }} -- tests/run_benchmark.py tests/compare_results.py tests/setup_datasets.py

            python3 tests/run_benchmark.py $FAAC_PATH_BASE $LIB_PATH_BASE ${precision}_base ${precision}_base.json $PERC_FLAG

            # Return to PR branch for next iteration and comparison
            git checkout ${{ github.sha }}

            python3 tests/compare_results.py ${precision}_base.json ${precision}_cand.json >> report.md || echo "REGRESSION_DETECTED=1" >> $GITHUB_ENV
          done
          cat report.md

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        with:
          name: report-ubuntu-22.04
          path: report.md

      - name: PR Feedback
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            if (fs.existsSync('report.md')) {
              const report = fs.readFileSync('report.md', 'utf8');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: report
              })
            }

      - name: Check for Regressions
        if: always()
        run: |
          if [ "${{ env.REGRESSION_DETECTED }}" == "1" ]; then
            echo "Regressions or missing data detected. Failing job."
            exit 1
          fi
