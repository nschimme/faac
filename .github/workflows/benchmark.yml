name: Efficiency & Perceptual

on:
  pull_request:
    branches: [ "master" ]
    paths:
      - "libfaac/**"
      - "tests/**"
  push:
    branches: [ "master" ]
    paths:
      - "libfaac/**"
      - "tests/**"

jobs:
  benchmark:
    # NOTE: ViSQOL via visqol-py is currently most reliable on ubuntu-22.04.
    name: ${{ matrix.arch }} / ${{ matrix.precision }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64]
        precision: [single, double]
        include:
          - arch: amd64
            os: ubuntu-22.04

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build bc ffmpeg

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore Venv
        id: cache-venv
        uses: actions/cache/restore@v4
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ hashFiles('tests/requirements.txt') }}

      - name: Install Python dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip setuptools wheel
          pip install -r tests/requirements.txt

      - name: Save Venv
        if: always() && steps.cache-venv.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ hashFiles('tests/requirements.txt') }}

      - name: Cache Datasets
        id: cache-datasets
        uses: actions/cache@v4
        with:
          path: tests/data/external
          key: ${{ runner.os }}-datasets-v4

      - name: Setup Datasets
        if: steps.cache-datasets.outputs.cache-hit != 'true'
        run: |
          . .venv/bin/activate
          python3 tests/setup_datasets.py

      - name: Run Benchmark (Candidate)
        run: |
          . .venv/bin/activate
          mkdir -p tests/results
          meson setup build_cand -Dfloating-point=${{ matrix.precision }} --buildtype=release
          ninja -C build_cand
          LIB_PATH="build_cand/libfaac/libfaac.so"
          FAAC_PATH="build_cand/frontend/faac"
          python3 tests/run_benchmark.py $FAAC_PATH $LIB_PATH "${{ matrix.arch }}_${{ matrix.precision }}_cand" "tests/results/${{ matrix.arch }}_${{ matrix.precision }}_cand.json" --coverage 100

      - name: Run Benchmark (Baseline)
        run: |
          . .venv/bin/activate
          git checkout ${{ github.base_ref || 'master' }}
          meson setup build_base -Dfloating-point=${{ matrix.precision }} --buildtype=release
          ninja -C build_base
          LIB_PATH="build_base/libfaac/libfaac.so"
          FAAC_PATH="build_base/frontend/faac"
          # Restore benchmark scripts from PR branch
          git checkout ${{ github.sha }} -- tests/
          python3 tests/run_benchmark.py $FAAC_PATH $LIB_PATH "${{ matrix.arch }}_${{ matrix.precision }}_base" "tests/results/${{ matrix.arch }}_${{ matrix.precision }}_base.json" --coverage 100

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.arch }}-${{ matrix.precision }}
          path: tests/results/*.json

  report:
    name: Consolidated Report
    needs: benchmark
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: tests/results
          pattern: results-*
          merge-multiple: true

      - name: Generate Report
        id: generate
        run: |
          python3 tests/compare_results.py tests/results > report.md || echo "REGRESSION_DETECTED=1" >> $GITHUB_ENV
          if [ ! -s report.md ]; then
            echo "Error: report.md is empty"
            exit 1
          fi
          cat report.md

      - name: PR Feedback
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (fs.existsSync('report.md')) {
              let report = fs.readFileSync('report.md', 'utf8').trim();
              if (report.length > 0) {
                const jobUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
                report += `\n\n---\n[View Detailed Job Log](${jobUrl})`;
                github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: report
                })
              }
            }

      - name: Check for Regressions
        run: |
          if [ "${{ env.REGRESSION_DETECTED }}" == "1" ]; then
            echo "Regressions or missing data detected. Failing job."
            exit 1
          fi
