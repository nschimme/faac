name: Efficiency & Perceptual Tests

on:
  pull_request:
    branches: [ "master" ]
    paths:
      - 'libfaac/**'
      - 'tests/**'

jobs:
  test:
    name: Multi-Matrix Perceptual Validation
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build bc faad
          pip install meson

      - name: Install ViSQOL
        run: |
          cargo install visqol

      - name: Checkout PR branch
        uses: actions/checkout@v3
        with:
          path: optimized

      - name: Checkout Base branch
        uses: actions/checkout@v3
        with:
          ref: ${{ github.base_ref }}
          path: baseline

      - name: Generate Multi-Rate Test Suite
        run: |
          python3 optimized/tests/generate_waves.py
          python3 optimized/tests/fetch_sqam.py

      - name: Build Baseline (Debug for Metrics)
        run: |
          cd baseline
          meson setup build -Dfloating-point=double --buildtype=debug
          ninja -C build

      - name: Build Optimized (Debug for Metrics)
        run: |
          cd optimized
          meson setup build -Dfloating-point=double --buildtype=debug
          ninja -C build

      - name: Run Baseline Matrix
        run: |
          python3 optimized/tests/run_benchmarks.py baseline/build/frontend/faac baseline baseline.json

      - name: Run Optimized Matrix
        run: |
          python3 optimized/tests/run_benchmarks.py optimized/build/frontend/faac optimized optimized.json

      - name: Generate Multi-Dimensional Report
        run: |
          python3 optimized/tests/compare_results.py baseline.json optimized.json > report.txt
          cat report.txt

      - name: Check for Regressions
        run: |
          # Pass if overall CPU reduction > 10%
          REDUCTION=$(grep "OVERALL CPU REDUCTION" report.txt | grep -oE "[0-9.]+" | head -1)
          if (( $(echo "$REDUCTION < 10" | bc -l) )); then
            echo "CPU optimization target not met"
            exit 1
          fi

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        with:
          name: perceptual-report
          path: report.txt
