name: Efficiency & Perceptual Matrix

on:
  pull_request:
    branches: [ "master" ]
    paths:
      - 'libfaac/**'
      - 'tests/**'

jobs:
  test:
    name: ${{ matrix.os }} - Matrix
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build bc faad
          pip install meson

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install meson ninja faad2
          pip3 install meson

      - name: Checkout PR branch
        uses: actions/checkout@v3
        with:
          path: optimized

      - name: Checkout Base branch
        uses: actions/checkout@v3
        with:
          ref: ${{ github.base_ref }}
          path: baseline

      - name: Generate Multi-Rate Test Suite
        run: |
          python3 optimized/tests/generate_waves.py

      - name: Build and Run Matrix
        run: |
          echo "## Summary Report for ${{ matrix.os }}" > report.md
          for precision in single double; do
            echo "---" >> report.md
            echo "### Precision: $precision" >> report.md

            # Baseline
            cd baseline
            rm -rf build
            meson setup build -Dfloating-point=$precision --buildtype=release
            ninja -C build
            cd ..

            # Optimized
            cd optimized
            rm -rf build
            meson setup build -Dfloating-point=$precision --buildtype=release
            ninja -C build
            cd ..

            LIB_EXT="so"
            FAAD_BIN="faad"
            if [ "${{ runner.os }}" == "macOS" ]; then
              LIB_EXT="dylib"
              FAAD_BIN="faad" # faad2 formula provides 'faad' binary
            fi

            # Note: We pass the faad binary name to run_benchmarks.py to ensure it works cross-platform
            python3 optimized/tests/run_benchmarks.py baseline/build/frontend/faac baseline/build/libfaac/libfaac.$LIB_EXT ${precision}_base ${precision}_base.json
            python3 optimized/tests/run_benchmarks.py optimized/build/frontend/faac optimized/build/libfaac/libfaac.$LIB_EXT ${precision}_opt ${precision}_opt.json

            python3 optimized/tests/compare_results.py ${precision}_base.json ${precision}_opt.json >> report.md
          done
          cat report.md

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ matrix.os }}
          path: report.md

      - name: PR Feedback
        if: github.event_name == 'pull_request' && runner.os == 'Linux'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('report.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            })
