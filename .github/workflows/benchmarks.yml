name: Efficiency & Quality Tests

on:
  pull_request:
    branches: [ "master" ]
    paths:
      - 'libfaac/**'
      - 'tests/**'

jobs:
  test:
    name: Multi-Matrix Perceptual Validation
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build bc faad
          pip install meson

      - name: Checkout PR branch
        uses: actions/checkout@v3
        with:
          path: optimized

      - name: Checkout Base branch
        uses: actions/checkout@v3
        with:
          ref: ${{ github.base_ref }}
          path: baseline

      - name: Generate Multi-Rate Test Suite
        run: |
          python3 optimized/tests/generate_waves.py
          # fetch_sqam.py is skipped in CI for reliability, uses synthetic matrix

      - name: Build and Run (Double Precision)
        run: |
          # Baseline
          cd baseline
          meson setup build_double -Dfloating-point=double --buildtype=release -Dc_args="-Os"
          ninja -C build_double
          cd ..

          # Optimized
          cd optimized
          meson setup build_double -Dfloating-point=double --buildtype=release -Dc_args="-Os"
          ninja -C build_double
          cd ..

          python3 optimized/tests/run_benchmarks.py baseline/build_double/frontend/faac baseline/build_double/libfaac/libfaac.so double_base double_base.json
          python3 optimized/tests/run_benchmarks.py optimized/build_double/frontend/faac optimized/build_double/libfaac/libfaac.so double_opt double_opt.json

          echo "### Double Precision Matrix ###" >> report.txt
          python3 optimized/tests/compare_results.py double_base.json double_opt.json >> report.txt

      - name: Build and Run (Single Precision)
        run: |
          # Baseline
          cd baseline
          meson setup build_single -Dfloating-point=single --buildtype=release -Dc_args="-Os"
          ninja -C build_single
          cd ..

          # Optimized
          cd optimized
          meson setup build_single -Dfloating-point=single --buildtype=release -Dc_args="-Os"
          ninja -C build_single
          cd ..

          python3 optimized/tests/run_benchmarks.py baseline/build_single/frontend/faac baseline/build_single/libfaac/libfaac.so single_base single_base.json
          python3 optimized/tests/run_benchmarks.py optimized/build_single/frontend/faac optimized/build_single/libfaac/libfaac.so single_opt single_opt.json

          echo -e "\n\n### Single Precision Matrix ###" >> report.txt
          python3 optimized/tests/compare_results.py single_base.json single_opt.json >> report.txt

      - name: Publish Report
        run: |
          cat report.txt
          # Fail if any test case in optimized reports FAIL
          if grep -q "FAIL" report.txt; then
            echo "Quality regression detected!"
            exit 1
          fi

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        with:
          name: qualitative-report
          path: report.txt
