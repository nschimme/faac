name: Efficiency & Perceptual Matrix

on:
  pull_request:
    branches: [ "master" ]

jobs:
  test:
    name: ${{ matrix.os }} - Matrix
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build bc faad ffmpeg
          pip install meson

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install meson ninja faad2

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          pip install meson ninja

      - name: Install ViSQOL (Linux only)
        if: runner.os == 'Linux'
        run: |
          # Use cargo to install visqol tool
          cargo install visqol

      - name: Cache Datasets
        id: cache-datasets
        uses: actions/cache@v3
        with:
          path: tests/data/external
          key: ${{ runner.os }}-datasets-v1

      - name: Setup Datasets
        if: steps.cache-datasets.outputs.cache-hit != 'true'
        run: |
          python3 tests/setup_datasets.py

      - name: Checkout PR branch
        uses: actions/checkout@v3
        with:
          path: optimized

      - name: Checkout Base branch
        uses: actions/checkout@v3
        with:
          ref: ${{ github.base_ref }}
          path: baseline


      - name: Build and Run Matrix
        shell: bash
        run: |
          echo "## Summary Report for ${{ matrix.os }}" > report.md
          for precision in single double; do
            echo "---" >> report.md
            echo "### Precision: $precision" >> report.md

            # Baseline
            cd baseline
            rm -rf build
            meson setup build -Dfloating-point=$precision --buildtype=release
            ninja -C build
            cd ..

            # Optimized
            cd optimized
            rm -rf build
            meson setup build -Dfloating-point=$precision --buildtype=release
            ninja -C build
            cd ..

            # Platform-specific paths
            LIB_PATH="baseline/build/libfaac/libfaac.so"
            FAAC_PATH="baseline/build/frontend/faac"
            PERC_FLAG=""

            if [ "${{ runner.os }}" == "macOS" ]; then
              LIB_PATH="baseline/build/libfaac/libfaac.dylib"
            elif [ "${{ runner.os }}" == "Windows" ]; then
              LIB_PATH="baseline/build/libfaac/libfaac.dll"
              FAAC_PATH="baseline/build/frontend/faac.exe"
            fi

            if [ "${{ runner.os }}" == "Linux" ]; then
              PERC_FLAG="--perceptual"
            fi

            python3 optimized/tests/run_benchmarks.py $FAAC_PATH $LIB_PATH ${precision}_base ${precision}_base.json $PERC_FLAG

            # Re-set paths for optimized build
            if [ "${{ runner.os }}" == "Windows" ]; then
                LIB_PATH="optimized/build/libfaac/libfaac.dll"
                FAAC_PATH="optimized/build/frontend/faac.exe"
            else
                LIB_PATH="optimized/build/libfaac/libfaac.$([[ "${{ runner.os }}" == "macOS" ]] && echo "dylib" || echo "so")"
                FAAC_PATH="optimized/build/frontend/faac"
            fi

            python3 optimized/tests/run_benchmarks.py $FAAC_PATH $LIB_PATH ${precision}_opt ${precision}_opt.json $PERC_FLAG

            python3 optimized/tests/compare_results.py ${precision}_base.json ${precision}_opt.json >> report.md
          done
          cat report.md

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ matrix.os }}
          path: report.md

      - name: PR Feedback
        if: github.event_name == 'pull_request' && runner.os == 'Linux'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('report.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            })
