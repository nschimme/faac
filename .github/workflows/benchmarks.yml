name: Efficiency & Quality Tests

on:
  pull_request:
    branches: [ "master" ]
    paths:
      - 'libfaac/**'
      - 'tests/**'

jobs:
  test:
    name: Multi-Pass Multi-Matrix Validation
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build bc faad
          pip install meson

      - name: Checkout PR branch
        uses: actions/checkout@v3
        with:
          path: optimized

      - name: Checkout Base branch
        uses: actions/checkout@v3
        with:
          ref: ${{ github.base_ref }}
          path: baseline

      - name: Generate Multi-Rate Test Suite
        run: |
          python3 optimized/tests/generate_waves.py

      - name: Build and Test Precision Matrix (Performance & Quality)
        run: |
          for precision in single double; do
            echo "--- Testing $precision precision (Performance Mode) ---"
            # Build Baseline
            cd baseline
            rm -rf build
            meson setup build -Dfloating-point=$precision --buildtype=release
            ninja -C build
            cd ..

            # Build Optimized
            cd optimized
            rm -rf build
            meson setup build -Dfloating-point=$precision --buildtype=release
            ninja -C build
            cd ..

            python3 optimized/tests/run_benchmarks.py baseline/build/frontend/faac ${precision}_base ${precision}_base.json
            python3 optimized/tests/run_benchmarks.py optimized/build/frontend/faac ${precision}_opt ${precision}_opt.json

            echo "### $precision Precision Matrix ###" >> report.txt
            python3 optimized/tests/compare_results.py ${precision}_base.json ${precision}_opt.json >> report.txt
          done

      - name: Build and Measure Size Optimized (Footprint Mode)
        run: |
          for precision in single double; do
            echo "--- Measuring $precision size (-Os) ---"
            # Build Baseline
            cd baseline
            rm -rf build_size
            meson setup build_size -Dfloating-point=$precision --buildtype=release -Dc_args="-Os"
            ninja -C build_size
            cd ..

            # Build Optimized
            cd optimized
            rm -rf build_size
            meson setup build_size -Dfloating-point=$precision --buildtype=release -Dc_args="-Os"
            ninja -C build_size
            cd ..

            python3 optimized/tests/measure_size.py baseline/build_size/libfaac/libfaac.so baseline/build_size/frontend/faac ${precision}_size_base.json
            python3 optimized/tests/measure_size.py optimized/build_size/libfaac/libfaac.so optimized/build_size/frontend/faac ${precision}_size_opt.json

            echo -e "\n### $precision Size Footprint (-Os) ###" >> report.txt
            # We use a simple JSON compare for size
            python3 -c "import json; b=json.load(open('${precision}_size_base.json')); o=json.load(open('${precision}_size_opt.json')); print(f'Library Size Change: {((o[\"lib_size\"]/b[\"lib_size\"])-1)*100:+.2f}% ({b[\"lib_size\"]} -> {o[\"lib_size\"]})')" >> report.txt
          done

      - name: Publish Report
        run: |
          cat report.txt
          if grep -q "FAIL" report.txt; then
            echo "Regression detected!"
            exit 1
          fi

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        with:
          name: multi-pass-report
          path: report.txt
