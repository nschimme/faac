name: Continuous Integration

on:
  push:
    branches: [ "master" ]
    tags-ignore: ['*']
    paths-ignore: ['**.md']
  pull_request:
    branches: [ "master" ]
    paths-ignore: ['**.md']

jobs:
  build:
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    defaults:
      run:
        shell: ${{ matrix.config.shell }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - {
              name: Linux GCC,
              os: ubuntu-latest,
              compiler: gcc,
              shell: bash,
              options: -Dfloating-point=double,
              cflags: -Wall
            }
          - {
              name: Linux GCC (Single Precision),
              os: ubuntu-latest,
              compiler: gcc,
              shell: bash,
              options: -Dfloating-point=single,
              cflags: -Wall
            }
          - {
              name: macOS Clang,
              os: macos-latest,
              compiler: clang,
              shell: bash,
              cflags: -Wall
            }
          - {
              name: MSYS2 UCRT64,
              os: windows-latest,
              compiler: gcc,
              shell: 'msys2 {0}',
              msystem: ucrt64,
              msys-env: mingw-w64-ucrt-x86_64,
              cflags: -Wall
            }
          - {
              name: Windows MSVC,
              os: windows-latest,
              compiler: cl,
              shell: pwsh,
              options: -Dfloating-point=double,
              cflags: /W4
            }
          - {
              name: Linux uClibc,
              os: ubuntu-latest,
              compiler: x86_64-linux-gcc,
              shell: bash,
              options: -Dfloating-point=double -Ddefault_library=static,
              cflags: -Wall -static,
              uclibc: true
            }
          - {
              name: Linux musl,
              os: ubuntu-latest,
              compiler: musl-gcc,
              shell: bash,
              options: -Dfloating-point=double -Ddefault_library=static,
              cflags: -Wall -static,
              musl: true
            }

    steps:
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y --no-install-recommends meson-1.5 musl-tools xz-utils

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: 1
        run: |
          brew update || true
          brew install \
            meson

      - name: Install dependencies (MSYS2)
        if: matrix.config.shell == 'msys2 {0}'
        uses: msys2/setup-msys2@v2.30.0
        with:
          msystem: ${{ matrix.config.msystem }}
          update: false
          install: >-
            ${{ matrix.config.msys-env }}-meson
            ${{ matrix.config.msys-env }}-gcc
            ${{ matrix.config.msys-env }}-ninja

      - name: Set up MSVC
        if: matrix.config.compiler == 'cl'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - uses: actions/checkout@v6

      - name: Set up uClibc toolchain cache
        if: matrix.config.uclibc
        id: cache-uclibc
        uses: actions/cache@v4
        with:
          path: bootlin-uclibc
          key: uclibc-2025.08-1-${{ runner.os }}

      - name: Download uClibc toolchain
        if: matrix.config.uclibc && steps.cache-uclibc.outputs.cache-hit != 'true'
        run: |
          curl -L https://toolchains.bootlin.com/downloads/releases/toolchains/x86-64/tarballs/x86-64--uclibc--stable-2025.08-1.tar.xz | tar -xJ
          # Use wildcard to handle potential naming variations in extracted directory
          mv x86[-_]64*uclibc*stable-2025.08-1 bootlin-uclibc

      - name: Configure uClibc path
        if: matrix.config.uclibc
        run: |
          echo "${{ github.workspace }}/bootlin-uclibc/bin" >> $GITHUB_PATH
          # Use apt instead of apt-get as requested
          sudo apt update
          sudo apt install -y --no-install-recommends libmpfr-dev libmpc-dev libgmp-dev

      - name: Install Python dependencies
        if: matrix.config.shell != 'msys2 {0}'
        run: |
          python3 -m pip install --break-system-packages meson ninja

      - name: Build (MSYS2)
        if: matrix.config.shell == 'msys2 {0}'
        env:
          CC: ${{ matrix.config.compiler }}
          CFLAGS: ${{ matrix.config.cflags }}
        run: |
          mkdir -p build temp
          cd build
          meson setup .. -Dprefix=$(realpath ../temp) ${{ matrix.config.options }}
          meson install

      - name: Build (General)
        if: matrix.config.shell != 'msys2 {0}'
        env:
          CC: ${{ matrix.config.uclibc && format('{0}/bootlin-uclibc/bin/x86_64-buildroot-linux-uclibc-gcc', github.workspace) || matrix.config.compiler }}
          CFLAGS: ${{ matrix.config.cflags }}
        run: |
          meson setup build -Dprefix="${{ github.workspace }}/temp" ${{ matrix.config.options }}
          meson install -C build

      - name: Upload artifacts (Windows)
        uses: actions/upload-artifact@v7
        if: runner.os == 'Windows'
        with:
          name: faac-${{ github.sha }}-${{ matrix.config.name }}
          path: temp/*

  cppcheck:
    name: Cppcheck
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y --no-install-recommends cppcheck

      - uses: actions/checkout@v6

      - name: Run cppcheck
        shell: bash
        run: |
          cppcheck --version
          cppcheck --error-exitcode=1 -j4 -q --check-level=exhaustive -Iinclude/ libfaac/ frontend/
